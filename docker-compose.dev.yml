version: "3.8"

services:
  mongodb:
    image: mongo:7
    container_name: urlshortener_mongodb_dev
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: changeme
      MONGO_INITDB_DATABASE: urlshortener
    volumes:
      - mongodb_dev_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: urlshortener_redis_dev
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data

volumes:
  mongodb_dev_data:
  redis_dev_data:
