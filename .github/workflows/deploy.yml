name: Blue-Green Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy to (blue/green)"
        required: false
        default: "auto"

env:
  IMAGE_BACKEND: ${{ vars.DOCKER_USERNAME }}/url-shortener-backend
  IMAGE_FRONTEND: ${{ vars.DOCKER_USERNAME }}/url-shortener-frontend

jobs:
  # ─── Job 1: Build & Push ─────────────────────────────────────
  build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set version tag
        id: version
        run: echo "version=sha-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_BACKEND }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_FRONTEND }}:latest
          build-args: |
            VITE_API_URL=
            VITE_APP_VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 2: Deploy ───────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine target environment
        id: env
        run: |
          CURRENT=$(cat .current_env 2>/dev/null || echo "blue")
          if [ "$CURRENT" == "blue" ]; then
            TARGET="green"
          else
            TARGET="blue"
          fi
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "target=$TARGET" >> $GITHUB_OUTPUT
          echo "Deploying to: $TARGET (current: $CURRENT)"

      - name: Deploy & Switch
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          TARGET="${{ steps.env.outputs.target }}"
          CURRENT="${{ steps.env.outputs.current }}"

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Blue-Green Deploy"
          echo "  Version: $VERSION"
          echo "  Current: $CURRENT → Target: $TARGET"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          echo "✅ Would deploy $VERSION to $TARGET environment"
          echo "✅ Would run health check"
          echo "✅ Would switch traffic if healthy"

      - name: Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | \`${{ needs.build.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Target Env | \`${{ steps.env.outputs.target }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Image | \`${{ env.IMAGE_BACKEND }}:${{ needs.build.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Image | \`${{ env.IMAGE_FRONTEND }}:${{ needs.build.outputs.version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ✅ Images built and pushed |" >> $GITHUB_STEP_SUMMARY
